expenses:
  handler: src/functions/api/expenses.list
  events:
    - http:
        path: expenses
        method: get
        authorizer: verifyToken
        cors: true 
expensesById:
  handler: src/functions/api/expenses.listById
  events:
    - http:
        path: expenses/{id}
        method: get
        authorizer: verifyToken
        cors: true 
expensesCreate:
  handler: src/functions/api/expenses.create
  events:
    - http:
        path: expenses
        method: post
        authorizer: verifyToken
        cors: true  
expensesUpdate:
  handler: src/functions/api/expenses.update
  events:
    - http:
        path: expenses
        method: put
        authorizer: verifyToken
        cors: true 
expensesDelete:
  handler: src/functions/api/expenses.delete
  events:
    - http:
        path: expenses/{id}
        method: delete
        authorizer: verifyToken
        cors: true
expensesDeletePost:
  handler: src/functions/api/expenses.delete
  events:
    - http:
        path: expenses/delete
        method: post
        authorizer: verifyToken
        cors: true
expenseAutomaticEvent:  
  handler: src/functions/events/expenseAutomatic.handler
  timeout: 300   
  events:  
    - eventBridge:
        name: "${self:service}-${opt:stage, self:provider.stage}-expense-automatic"
        description: "Servico de geração automática de despesas para o mês seguinte"
        schedule: cron(30 23 L * ? *) # no ultimo dia do mês
    - http:
          path: expenses/run-automatic
          method: get        
          cors: true